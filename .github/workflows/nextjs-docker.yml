name: Next.js CI + Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

  push_to_docker_hub:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/ai-docker:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-docker:${{ github.sha }}

      - name: Tag and Push latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-docker:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/ai-docker:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-docker:latest
